<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>L-Acoustics Preset Helper</title>
    
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            display: flex;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background-color: #fff;
            padding: 20px 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            max-width: 450px;
            width: 100%;
        }
        h1 {
            font-size: 1.5em;
            text-align: center;
            color: #2c3e50;
            margin-top: 0;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 1em;
            background-color: #fff;
        }
        
        /* Box s výsledky */
        .result-box {
            margin-top: 20px;
            padding: 15px;
            background-color: #e8f4f8;
            border-radius: 6px;
            border-left: 5px solid #3498db;
            display: none;
        }
        .result-box h3 {
            margin-top: 0;
            margin-bottom: 15px;
            color: #2980b9;
            border-bottom: 1px solid #bce8f1;
            padding-bottom: 8px;
        }
        
        /* Uspořádání do jednoho řádku */
        .speaker-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px dashed #bce8f1;
            font-size: 1.05em;
        }
        .speaker-row:last-child {
            border-bottom: none;
        }
        .spk-name {
            font-weight: bold;
            color: #2c3e50;
            width: 30%;
        }
        .spk-data {
            width: 70%;
            text-align: right;
            color: #34495e;
        }
        
        /* Zvýraznění záporné polarity */
        .pol-minus {
            color: #e74c3c;
            font-weight: bold;
            font-size: 1.1em;
        }

        .error-message {
            text-align: center;
            color: #e74c3c;
            font-weight: bold;
            padding: 15px 0;
            display: none;
        }
        .footer {
            margin-top: 20px;
            font-size: 0.8em;
            text-align: center;
            color: #7f8c8d;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>L-Acoustics Setup</h1>
    
    <div class="form-group">
        <label for="topSpeaker">Top reprobedna:</label>
        <select id="topSpeaker" onchange="findPreset()">
            <option value="">-- Vyber Top --</option>
            <option value="kara2">Kara II</option>
            <option value="a15">A15</option>
            <option value="a10">A10</option>
        </select>
    </div>

    <div class="form-group">
        <label for="subSpeaker">Subwoofer:</label>
        <select id="subSpeaker" onchange="findPreset()">
            <option value="">-- Vyber Sub --</option>
            <option value="sb18">SB18</option>
            <option value="ks21">KS21</option>
            <option value="ks28">KS28</option>
        </select>
    </div>

    <div class="form-group">
        <label for="subMode">Režim Subwooferu:</label>
        <select id="subMode" onchange="findPreset()">
            <option value="standard">Standard</option>
            <option value="c">Cardioid (C)</option>
            <option value="cx">Cardioid (Cx)</option>
        </select>
    </div>

    <div id="resultBox" class="result-box">
        <h3>Pre-alignment Delay:</h3>
        
        <div class="speaker-row">
            <span id="topName" class="spk-name">Top</span>
            <span class="spk-data">Delay: <strong id="topDelay">-</strong> | Pol: <span id="topPol">-</span></span>
        </div>

        <div class="speaker-row">
            <span id="subName" class="spk-name">Sub</span>
            <span class="spk-data">Delay: <strong id="subDelay">-</strong> | Pol: <span id="subPol">-</span></span>
        </div>
    </div>

    <div id="errorMessage" class="error-message">
        Tato kombinace není v manuálu definována.
    </div>

    <div class="footer">
        Zdroj dat: Preset Guide v28.0
    </div>
</div>

<script>
    // Integrovaná databáze zpoždění a polarity
    const presetDatabase = {
        // --- Kara II + SB18 ---
        "kara2-sb18-standard": { topDelay: "2.5 ms", topPol: "+", subDelay: "0 ms", subPol: "+" },
        "kara2-sb18-c": { topDelay: "8.0 ms", topPol: "+", subDelay: "0 ms", subPol: "+" },
        "kara2-sb18-cx": { topDelay: "6.5 ms", topPol: "+", subDelay: "0 ms", subPol: "+" },
        
        // --- Kara II + KS21 ---
        "kara2-ks21-standard": { topDelay: "0.5 ms", topPol: "+", subDelay: "0 ms", subPol: "+" },
        "kara2-ks21-c": { topDelay: "6.0 ms", topPol: "+", subDelay: "0 ms", subPol: "+" },
        "kara2-ks21-cx": { topDelay: "5.5 ms", topPol: "+", subDelay: "0 ms", subPol: "+" },

        // --- Kara II + KS28 ---
        "kara2-ks28-standard": { topDelay: "0 ms", topPol: "+", subDelay: "5.0 ms", subPol: "+" },
        "kara2-ks28-c": { topDelay: "0.5 ms", topPol: "+", subDelay: "0 ms", subPol: "+" },
        "kara2-ks28-cx": { topDelay: "4.5 ms", topPol: "+", subDelay: "0 ms", subPol: "+" },

        // --- A15 + KS21 ---
        "a15-ks21-standard": { topDelay: "0 ms", topPol: "+", subDelay: "2.3 ms", subPol: "+" },
        "a15-ks21-c": { topDelay: "9.0 ms", topPol: "+", subDelay: "0 ms", subPol: "+" },
        "a15-ks21-cx": { topDelay: "8.0 ms", topPol: "+", subDelay: "0 ms", subPol: "+" },

        // --- A10 + KS21 ---
        "a10-ks21-standard": { topDelay: "0 ms", topPol: "+", subDelay: "0 ms", subPol: "+" },
        "a10-ks21-c": { topDelay: "5.5 ms", topPol: "+", subDelay: "0 ms", subPol: "+" },
        "a10-ks21-cx": { topDelay: "0 ms", topPol: "+", subDelay: "0 ms", subPol: "+" }
    };

    function findPreset() {
        const topSelect = document.getElementById('topSpeaker');
        const subSelect = document.getElementById('subSpeaker');
        const mode = document.getElementById('subMode').value;
        
        const top = topSelect.value;
        const sub = subSelect.value;
        
        const resultBox = document.getElementById('resultBox');
        const errorMessage = document.getElementById('errorMessage');

        if (top && sub) {
            const searchKey = top + "-" + sub + "-" + mode;
            const preset = presetDatabase[searchKey];

            if (preset) {
                // Vyplnění názvů
                document.getElementById('topName').innerText = topSelect.options[topSelect.selectedIndex].text;
                document.getElementById('subName').innerText = subSelect.options[subSelect.selectedIndex].text;

                // Vyplnění Delay
                document.getElementById('topDelay').innerText = preset.topDelay;
                document.getElementById('subDelay').innerText = preset.subDelay;

                // Zpracování polarity (Top)
                const topPolEl = document.getElementById('topPol');
                topPolEl.innerText = preset.topPol;
                if (preset.topPol === "-") {
                    topPolEl.className = "pol-minus";
                } else {
                    topPolEl.className = "";
                }

                // Zpracování polarity (Sub)
                const subPolEl = document.getElementById('subPol');
                subPolEl.innerText = preset.subPol;
                if (preset.subPol === "-") {
                    subPolEl.className = "pol-minus";
                } else {
                    subPolEl.className = "";
                }

                errorMessage.style.display = 'none';
                resultBox.style.display = 'block';
            } else {
                resultBox.style.display = 'none';
                errorMessage.style.display = 'block';
            }
        } else {
            resultBox.style.display = 'none';
            errorMessage.style.display = 'none';
        }
    }
</script>

</body>
</html>
