<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L-Acoustics Preset Helper</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            display: flex;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background-color: #fff;
            padding: 20px 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            max-width: 450px;
            width: 100%;
        }
        h1 {
            font-size: 1.5em;
            text-align: center;
            color: #2c3e50;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 1em;
        }
        .result-box {
            margin-top: 20px;
            padding: 15px;
            background-color: #e8f4f8;
            border-radius: 4px;
            display: none;
        }
        .result-box h3 {
            margin-top: 0;
            margin-bottom: 15px;
            color: #2980b9;
            border-bottom: 2px solid #3498db;
            padding-bottom: 5px;
        }
        .speaker-row {
            background-color: #fff;
            padding: 10px;
            border-radius: 4px;
            border-left: 4px solid #3498db;
            margin-bottom: 10px;
            font-size: 1em;
            border: 1px solid #eee;
            border-left: 4px solid #3498db;
        }
        .speaker-name {
            font-weight: bold;
            color: #2c3e50;
            display: inline-block;
            min-width: 70px;
        }
        .polarity-negative {
            color: #e74c3c;
            font-weight: bold;
        }
        .kombinace-nenalezena {
            text-align: center;
            color: #e74c3c;
            font-weight: bold;
            padding: 10px 0;
        }
        .footer {
            margin-top: 20px;
            font-size: 0.8em;
            text-align: center;
            color: #7f8c8d;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>L-Acoustics Setup</h1>
    
    <div class="form-group">
        <label for="topSpeaker">Top reprobedna:</label>
        <select id="topSpeaker" onchange="findPreset()">
            <option value="">-- Vyber Top --</option>
            <option value="KARA II">Kara II</option>
            <option value="A15">A15</option>
            <option value="A10">A10</option>
        </select>
    </div>

    <div class="form-group">
        <label for="subSpeaker">Subwoofer:</label>
        <select id="subSpeaker" onchange="findPreset()">
            <option value="">-- Vyber Sub --</option>
            <option value="SB18">SB18</option>
            <option value="KS21">KS21</option>
            <option value="KS28">KS28</option>
        </select>
    </div>

    <div class="form-group">
        <label for="subMode">Režim Subwooferu:</label>
        <select id="subMode" onchange="findPreset()">
            <option value="standard">Standard</option>
            <option value="c">Cardioid (C)</option>
            <option value="cx">Cardioid (Cx)</option>
        </select>
    </div>

    <div id="resultBox" class="result-box">
        <h3>Pre-alignment Delay:</h3>
        
        <p id="topResult" class="speaker-row">
            <span id="topName" class="speaker-name">-</span> ➔ 
            <strong>Delay:</strong> <span id="topDelayValue">-</span> | 
            <strong>Pol:</strong> <span id="topPolarityValue">-</span>
        </p>

        <p id="subResult" class="speaker-row">
            <span id="subName" class="speaker-name">-</span> ➔ 
            <strong>Delay:</strong> <span id="subDelayValue">-</span> | 
            <strong>Pol:</strong> <span id="subPolarityValue">-</span>
        </p>

        <p id="noPresetMessage" class="kombinace-nenalezena" style="display:none;">
            Kombinace není v manuálu.
        </p>
    </div>

    <div class="footer">
        Zdroj dat: L-Acoustics Preset Guide version 28.0 (Jan 2026)
    </div>
</div>

<script src="data.js"></script>

<script>
    function findPreset() {
        const topSelect = document.getElementById('topSpeaker');
        const subSelect = document.getElementById('subSpeaker');
        const mode = document.getElementById('subMode').value;
        const resultBox = document.getElementById('resultBox');
        
        const top = topSelect.value;
        const sub = subSelect.value;
        
        if (top && sub) {
            const searchKey = top + "-" + sub + "-" + mode;
            
            // presetDatabase se načte ze souboru data.js
            const preset = presetDatabase[searchKey];

            document.getElementById('noPresetMessage').style.display = 'none';
            document.getElementById('topResult').style.display = 'block';
            document.getElementById('subResult').style.display = 'block';

            if (preset) {
                document.getElementById('topName').innerText = topSelect.options[topSelect.selectedIndex].text;
                document.getElementById('subName').innerText = subSelect.options[subSelect.selectedIndex].text;

                const topPolEl = document.getElementById('topPolarityValue');
                const subPolEl = document.getElementById('subPolarityValue');

                document.getElementById('topDelayValue').innerText = preset.topDelay;
                topPolEl.innerText = preset.topPolarity;
                document.getElementById('subDelayValue').innerText = preset.subDelay;
                subPolEl.innerText = preset.subPolarity;

                // Červené zvýraznění pokud je polarita mínus
                if (preset.topPolarity === "-") {
                    topPolEl.classList.add('polarity-negative');
                } else {
                    topPolEl.classList.remove('polarity-negative');
                }
                
                if (preset.subPolarity === "-") {
                    subPolEl.classList.add('polarity-negative');
                } else {
                    subPolEl.classList.remove('polarity-negative');
                }
                
            } else {
                document.getElementById('topResult').style.display = 'none';
                document.getElementById('subResult').style.display = 'none';
                document.getElementById('noPresetMessage').style.display = 'block';
            }
            resultBox.style.display = 'block';
        } else {
            resultBox.style.display = 'none';
        }
    }
</script>

</body>
</html>
