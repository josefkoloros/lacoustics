<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L-Acoustics Preset Helper</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            display: flex;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background-color: #fff;
            padding: 20px 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 100%;
        }
        h1 {
            font-size: 1.5em;
            text-align: center;
            color: #2c3e50;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 1em;
        }
        .result-box {
            margin-top: 20px;
            padding: 15px;
            background-color: #e8f4f8;
            border-left: 5px solid #3498db;
            border-radius: 4px;
            display: none;
        }
        .result-box h3 {
            margin-top: 0;
            color: #2980b9;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>L-Acoustics Setup</h1>
    
    <div class="form-group">
        <label for="topSpeaker">Top reprobedna:</label>
        <select id="topSpeaker" onchange="findPreset()">
            <option value="">-- Vyber Top --</option>
            <option value="kara2">Kara II</option>
            <option value="a15">A15</option>
        </select>
    </div>

    <div class="form-group">
        <label for="subSpeaker">Subwoofer:</label>
        <select id="subSpeaker" onchange="findPreset()">
            <option value="">-- Vyber Sub --</option>
            <option value="sb18">SB18</option>
            <option value="ks21">KS21</option>
            <option value="ks28">KS28</option>
        </select>
    </div>

    <div id="resultBox" class="result-box">
        <h3>Doporučené nastavení:</h3>
        <p><strong>Delay:</strong> <span id="delayValue">-</span></p>
        <p><strong>Polarita:</strong> <span id="polarityValue">-</span></p>
    </div>
</div>

<script>
    // Zde je databáze presetů s ukázkovými hodnotami. 
    // Po nahrání na GitHub je můžeš kdykoliv upravit podle reálného manuálu!
    const presetDatabase = {
        "kara2-sb18": { delay: "2.0 ms", polarity: "Positive (+)" },
        "kara2-ks21": { delay: "1.5 ms", polarity: "Negative (-)" },
        "kara2-ks28": { delay: "3.2 ms", polarity: "Positive (+)" },
        "a15-sb18": { delay: "0.0 ms", polarity: "Positive (+)" },
        "a15-ks21": { delay: "1.0 ms", polarity: "Positive (+)" },
        "a15-ks28": { delay: "2.5 ms", polarity: "Negative (-)" }
    };

    function findPreset() {
        const top = document.getElementById('topSpeaker').value;
        const sub = document.getElementById('subSpeaker').value;
        const resultBox = document.getElementById('resultBox');
        
        if (top && sub) {
            const searchKey = top + "-" + sub;
            const preset = presetDatabase[searchKey];

            if (preset) {
                document.getElementById('delayValue').innerText = preset.delay;
                document.getElementById('polarityValue').innerText = preset.polarity;
            } else {
                document.getElementById('delayValue').innerText = "Neznámá kombinace";
                document.getElementById('polarityValue').innerText = "Neznámá kombinace";
            }
            resultBox.style.display = 'block';
        } else {
            resultBox.style.display = 'none';
        }
    }
</script>

</body>
</html>
