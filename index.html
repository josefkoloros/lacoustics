<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L-Acoustics Setup</title>
    <style>
        * { box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f6f8;
            color: #2c3e50;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            max-width: 600px;
            width: 100%;
        }

        h1 {
            font-size: 1.7em;
            text-align: center;
            color: #1a252f;
            margin-top: 0;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #34495e;
            font-size: 0.95em;
        }
        
        .input-row {
            display: flex;
            gap: 15px;
            align-items: stretch; 
        }
        
        select {
            flex: 1; 
            min-width: 180px;
            height: 44px;
            padding: 0 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 1em;
            background-color: #f8fafc;
            color: #2c3e50;
            cursor: pointer;
            outline: none;
            transition: border-color 0.2s, background-color 0.2s;
        }
        
        select:focus { border-color: #3498db; background-color: #ffffff; }
        select:disabled { background-color: #eef2f5; cursor: not-allowed; color: #95a5a6; }
        
        .inline-result {
            display: none;
            align-items: center; 
            height: 44px; 
            background-color: #e8f4f8;
            padding: 0 16px;
            border-radius: 6px;
            border-left: 5px solid #3498db;
            font-size: 0.95em;
            white-space: nowrap; 
            flex: 0 0 185px; 
        }
        
        .pol-minus { color: #e74c3c; font-weight: bold; font-size: 1.1em; }
        .pol-plus { font-weight: bold; font-size: 1.1em; color: #2c3e50; }

        .footer {
            margin-top: 30px;
            font-size: 0.8em;
            text-align: center;
            color: #95a5a6;
        }

        @media (max-width: 480px) {
            .input-row { flex-direction: column; gap: 10px; }
            select, .inline-result { width: 100%; flex: auto; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>L-Acoustics Setup</h1>
    
    <div class="form-group">
        <label>Top reprobedna:</label>
        <div class="input-row">
            <select id="topSpeaker" onchange="updateSub1()"></select>
            <div id="topResult" class="inline-result">
                Delay: &nbsp;<strong id="topDelay">-</strong>&nbsp;&nbsp;|&nbsp;&nbsp;Pol: &nbsp;<span id="topPol">-</span>
            </div>
        </div>
    </div>

    <div class="form-group">
        <label>Subwoofer 1:</label>
        <div class="input-row">
            <select id="sub1Speaker" onchange="updateSub2()" disabled></select>
            <div id="sub1Result" class="inline-result">
                Delay: &nbsp;<strong id="sub1Delay">-</strong>&nbsp;&nbsp;|&nbsp;&nbsp;Pol: &nbsp;<span id="sub1Pol">-</span>
            </div>
        </div>
    </div>

    <div class="form-group">
        <label>Subwoofer 2:</label>
        <div class="input-row">
            <select id="sub2Speaker" onchange="updateMode()" disabled></select>
            <div id="sub2Result" class="inline-result">
                Delay: &nbsp;<strong id="sub2Delay">-</strong>&nbsp;&nbsp;|&nbsp;&nbsp;Pol: &nbsp;<span id="sub2Pol">-</span>
            </div>
        </div>
    </div>

    <div class="form-group">
        <label>Režim sestavy:</label>
        <select id="subMode" onchange="showResults()" disabled style="width: 100%;"></select>
    </div>

    <div class="footer">Zdroj dat: Preset Guide v28.0</div>
</div>

<script src="data.js?v=8"></script>

<script>
    // Zde jsou PŘEKLADY. Vlevo je klíč z databáze, vpravo co se ukáže uživateli.
    const labels = {
        "kara2": "Kara II", 
        "a15": "A15", 
        "a10": "A10",
        "arcs_wifo": "ARCS Wide/Focus",
        "arcs2": "ARCS II",
        "arcs": "ARCS (Legacy)",
        "x12": "X12",
        "sb18": "SB18", "ks21": "KS21", "ks28": "KS28", "sb28": "SB28",
        "none": "-- Bez 2. subu --",
        "60": "Standard (60 Hz)", "100": "Standard (100 Hz)",
        "60_c": "Cardioid C (60 Hz)", "100_c": "Cardioid C (100 Hz)",
        "60_cx": "Cardioid Cx (60 Hz)", "100_cx": "Cardioid Cx (100 Hz)",
        "standard": "Standard (Sub1 100Hz / Sub2 60Hz)",
        "c": "Cardioid C (Sub1 100Hz / Sub2 60Hz)",
        "cx": "Cardioid Cx (Sub1 100Hz / Sub2 60Hz)"
    };

    window.onload = function() {
        populateDropdown('topSpeaker', getAvailableOptions(0, []));
    };

    function getAvailableOptions(index, filters) {
        const options = new Set();
        Object.keys(presetDatabase).forEach(key => {
            const parts = key.split('-');
            let match = true;
            for(let i=0; i<filters.length; i++) {
                if(filters[i] && parts[i] !== filters[i]) match = false;
            }
            if(match) options.add(parts[index]);
        });
        return Array.from(options);
    }

    function populateDropdown(id, optionsArray) {
        const select = document.getElementById(id);
        select.innerHTML = '<option value="">-- Vyber --</option>';
        select.disabled = optionsArray.length === 0;

        optionsArray.forEach(val => {
            const option = document.createElement('option');
            option.value = val;
            option.text = labels[val] || val;
            select.appendChild(option);
        });

        if(optionsArray.length === 1) {
            select.value = optionsArray[0];
        }
    }

    function hideResults() {
        document.getElementById('topResult').style.display = 'none';
        document.getElementById('sub1Result').style.display = 'none';
        document.getElementById('sub2Result').style.display = 'none';
    }

    function updateSub1() {
        hideResults();
        const top = document.getElementById('topSpeaker').value;
        if(!top) {
            populateDropdown('sub1Speaker', []); populateDropdown('sub2Speaker', []); populateDropdown('subMode', []); return;
        }
        populateDropdown('sub1Speaker', getAvailableOptions(1, [top]));
        updateSub2();
    }

    function updateSub2() {
        hideResults();
        const top = document.getElementById('topSpeaker').value;
        const sub1 = document.getElementById('sub1Speaker').value;
        if(!sub1) {
            populateDropdown('sub2Speaker', []); populateDropdown('subMode', []); return;
        }
        populateDropdown('sub2Speaker', getAvailableOptions(2, [top, sub1]));
        updateMode();
    }

    function updateMode() {
        hideResults();
        const top = document.getElementById('topSpeaker').value;
        const sub1 = document.getElementById('sub1Speaker').value;
        const sub2 = document.getElementById('sub2Speaker').value;
        if(!sub2) {
            populateDropdown('subMode', []); return;
        }
        populateDropdown('subMode', getAvailableOptions(3, [top, sub1, sub2]));
        showResults();
    }

    function applyPolarity(elementId, value) {
        const el = document.getElementById(elementId);
        el.innerText = value;
        el.className = (value === "-") ? "pol-minus" : "pol-plus";
    }

    function showResults() {
        const top = document.getElementById('topSpeaker').value;
        const sub1 = document.getElementById('sub1Speaker').value;
        const sub2 = document.getElementById('sub2Speaker').value;
        const mode = document.getElementById('subMode').value;
        
        if (top && sub1 && sub2 && mode) {
            const preset = presetDatabase[`${top}-${sub1}-${sub2}-${mode}`];
            if (preset) {
                document.getElementById('topDelay').innerText = preset.topDelay;
                applyPolarity('topPol', preset.topPol);
                document.getElementById('topResult').style.display = 'flex';

                document.getElementById('sub1Delay').innerText = preset.sub1Delay;
                applyPolarity('sub1Pol', preset.sub1Pol);
                document.getElementById('sub1Result').style.display = 'flex';

                if (sub2 !== 'none') {
                    document.getElementById('sub2Delay').innerText = preset.sub2Delay;
                    applyPolarity('sub2Pol', preset.sub2Pol);
                    document.getElementById('sub2Result').style.display = 'flex';
                }
            }
        }
    }
</script>

</body>
</html>
