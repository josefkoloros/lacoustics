<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L-Acoustics Setup</title>
    <style>
        * { box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f6f8;
            color: #2c3e50;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            max-width: 650px;
            width: 100%;
        }

        h1 {
            font-size: 1.7em;
            text-align: center;
            color: #1a252f;
            margin-top: 0;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #34495e;
            font-size: 0.95em;
        }
        
        .input-row {
            display: flex;
            gap: 10px;
            align-items: stretch; 
        }
        
        select {
            flex: 1; 
            min-width: 120px;
            height: 44px;
            padding: 0 10px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 0.95em;
            background-color: #f8fafc;
            color: #2c3e50;
            cursor: pointer;
            outline: none;
            transition: border-color 0.2s, background-color 0.2s;
        }
        
        select:focus { border-color: #3498db; background-color: #ffffff; }
        select:disabled { background-color: #eef2f5; cursor: not-allowed; color: #95a5a6; }
        
        .inline-result {
            display: none;
            align-items: center; 
            height: 44px; 
            background-color: #e8f4f8;
            padding: 0 14px;
            border-radius: 6px;
            border-left: 5px solid #3498db;
            font-size: 0.9em;
            white-space: nowrap; 
            flex: 0 0 175px; 
        }
        
        .pol-minus { color: #e74c3c; font-weight: bold; font-size: 1.15em; }
        .pol-plus { font-weight: bold; font-size: 1.15em; color: #2c3e50; }

        .error-message {
            text-align: center;
            color: #e74c3c;
            background-color: #fdf2f2;
            border: 1px solid #fadbd8;
            font-weight: bold;
            padding: 12px;
            border-radius: 6px;
            display: none;
            margin-top: 10px;
        }

        .footer {
            margin-top: 30px;
            font-size: 0.8em;
            text-align: center;
            color: #95a5a6;
        }

        @media (max-width: 550px) {
            .input-row { flex-wrap: wrap; }
            select { flex: 1 1 45%; }
            .inline-result { flex: 1 1 100%; margin-top: 5px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>L-Acoustics Setup</h1>
    
    <div class="form-group">
        <label>Top reprobedna:</label>
        <div class="input-row">
            <select id="topSpeaker" onchange="updateSub1()"></select>
            <div id="topResult" class="inline-result">
                Delay: &nbsp;<strong id="topDelay">-</strong>&nbsp;&nbsp;|&nbsp;&nbsp;Pol: &nbsp;<span id="topPol">-</span>
            </div>
        </div>
    </div>

    <div class="form-group">
        <label>Subwoofer 1:</label>
        <div class="input-row">
            <select id="sub1Speaker" onchange="updateSub1Mode()" disabled></select>
            <select id="sub1Mode" onchange="updateSub2()" disabled></select>
            <div id="sub1Result" class="inline-result">
                Delay: &nbsp;<strong id="sub1Delay">-</strong>&nbsp;&nbsp;|&nbsp;&nbsp;Pol: &nbsp;<span id="sub1Pol">-</span>
            </div>
        </div>
    </div>

    <div class="form-group">
        <label>Subwoofer 2:</label>
        <div class="input-row">
            <select id="sub2Speaker" onchange="updateSub2Mode()" disabled></select>
            <select id="sub2Mode" onchange="showResults()" disabled></select>
            <div id="sub2Result" class="inline-result">
                Delay: &nbsp;<strong id="sub2Delay">-</strong>&nbsp;&nbsp;|&nbsp;&nbsp;Pol: &nbsp;<span id="sub2Pol">-</span>
            </div>
        </div>
    </div>

    <div id="errorMessage" class="error-message">
        Tato kombinace není v manuálu definována.
    </div>

    <div class="footer">Zdroj dat: Preset Guide v28.0</div>
</div>

<script src="data.js?v=11"></script>

<script>
    const labels = {
        "kara2": "Kara II", "a15": "A15", "a10": "A10", "arcs_wifo": "ARCS Wide/Focus", "arcs2": "ARCS II", "arcs": "ARCS (Legacy)", "x12": "X12",
        "sb18": "SB18", "ks21": "KS21", "ks28": "KS28", "sb28": "SB28",
        "none": "-- Bez --",
        "60": "[60] Standard", "100": "[100] Standard",
        "60_c": "[60] Cardioid", "100_c": "[100] Cardioid",
        "60_cx": "[60] Cardioid Cx", "100_cx": "[100] Cardioid Cx"
    };

    window.onload = function() {
        populateDropdown('topSpeaker', getAvailableOptions(0, []));
    };

    function val(id) { return document.getElementById(id).value; }

    function getAvailableOptions(index, filters) {
        const options = new Set();
        Object.keys(presetDatabase).forEach(key => {
            const parts = key.split('-');
            let match = true;
            for(let i=0; i<filters.length; i++) {
                if(filters[i] && parts[i] !== filters[i]) match = false;
            }
            if(match) options.add(parts[index]);
        });
        return Array.from(options);
    }

    function populateDropdown(id, optionsArray) {
        const select = document.getElementById(id);
        select.innerHTML = '<option value="">-- Vyber --</option>';
        select.disabled = optionsArray.length === 0;

        optionsArray.forEach(val => {
            const option = document.createElement('option');
            option.value = val;
            option.text = labels[val] || val;
            select.appendChild(option);
        });

        // KLÍČOVÁ OPRAVA ZAMRZÁNÍ:
        // Pokud aplikace vybere jedinou možnost, musíme ručně spustit event,
        // aby se kaskáda roletek plynule odemkla až do konce.
        if(optionsArray.length === 1) {
            select.value = optionsArray[0];
            select.dispatchEvent(new Event('change')); 
        }
    }

    function hideResults() {
        document.getElementById('topResult').style.display = 'none';
        document.getElementById('sub1Result').style.display = 'none';
        document.getElementById('sub2Result').style.display = 'none';
        document.getElementById('errorMessage').style.display = 'none';
    }

    function updateSub1() {
        hideResults();
        if(!val('topSpeaker')) {
            ['sub1Speaker', 'sub1Mode', 'sub2Speaker', 'sub2Mode'].forEach(id => populateDropdown(id, [])); return;
        }
        populateDropdown('sub1Speaker', getAvailableOptions(1, [val('topSpeaker')]));
    }

    function updateSub1Mode() {
        hideResults();
        if(!val('sub1Speaker')) {
            ['sub1Mode', 'sub2Speaker', 'sub2Mode'].forEach(id => populateDropdown(id, [])); return;
        }
        populateDropdown('sub1Mode', getAvailableOptions(2, [val('topSpeaker'), val('sub1Speaker')]));
    }

    function updateSub2() {
        hideResults();
        if(!val('sub1Mode')) {
            ['sub2Speaker', 'sub2Mode'].forEach(id => populateDropdown(id, [])); return;
        }
        populateDropdown('sub2Speaker', getAvailableOptions(3, [val('topSpeaker'), val('sub1Speaker'), val('sub1Mode')]));
    }

    function updateSub2Mode() {
        hideResults();
        if(!val('sub2Speaker')) {
            populateDropdown('sub2Mode', []); return;
        }
        populateDropdown('sub2Mode', getAvailableOptions(4, [val('topSpeaker'), val('sub1Speaker'), val('sub1Mode'), val('sub2Speaker')]));
    }

    function applyPolarity(elementId, value) {
        const el = document.getElementById(elementId);
        el.innerText = value;
        el.className = (value === "-") ? "pol-minus" : "pol-plus";
    }

    function showResults() {
        const key = `${val('topSpeaker')}-${val('sub1Speaker')}-${val('sub1Mode')}-${val('sub2Speaker')}-${val('sub2Mode')}`;
        
        if (val('topSpeaker') && val('sub1Speaker') && val('sub1Mode') && val('sub2Speaker') && val('sub2Mode')) {
            const preset = presetDatabase[key];
            if (preset) {
                document.getElementById('topDelay').innerText = preset.topDelay;
                applyPolarity('topPol', preset.topPol);
                document.getElementById('topResult').style.display = 'flex';

                document.getElementById('sub1Delay').innerText = preset.sub1Delay;
                applyPolarity('sub1Pol', preset.sub1Pol);
                document.getElementById('sub1Result').style.display = 'flex';

                if (val('sub2Speaker') !== 'none') {
                    document.getElementById('sub2Delay').innerText = preset.sub2Delay;
                    applyPolarity('sub2Pol', preset.sub2Pol);
                    document.getElementById('sub2Result').style.display = 'flex';
                }
            } else {
                document.getElementById('errorMessage').style.display = 'block';
            }
        }
    }
</script>

</body>
</html>
