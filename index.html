<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L-Acoustics Preset Helper</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            display: flex;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background-color: #fff;
            padding: 20px 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 100%;
        }
        h1 {
            font-size: 1.5em;
            text-align: center;
            color: #2c3e50;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 1em;
        }
        .result-box {
            margin-top: 20px;
            padding: 15px;
            background-color: #e8f4f8;
            border-left: 5px solid #3498db;
            border-radius: 4px;
            display: none;
        }
        .result-box h3 {
            margin-top: 0;
            color: #2980b9;
        }
        .footer {
            margin-top: 20px;
            font-size: 0.8em;
            text-align: center;
            color: #7f8c8d;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>L-Acoustics Setup</h1>
    
    <div class="form-group">
        <label for="topSpeaker">Top reprobedna:</label>
        <select id="topSpeaker" onchange="findPreset()">
            <option value="">-- Vyber Top --</option>
            <option value="kara2">Kara II</option>
            <option value="a15">A15</option>
            <option value="a10">A10</option>
        </select>
    </div>

    <div class="form-group">
        <label for="subSpeaker">Subwoofer:</label>
        <select id="subSpeaker" onchange="findPreset()">
            <option value="">-- Vyber Sub --</option>
            <option value="sb18">SB18</option>
            <option value="ks21">KS21</option>
            <option value="ks28">KS28</option>
        </select>
    </div>

    <div class="form-group">
        <label for="subMode">Režim Subwooferu:</label>
        <select id="subMode" onchange="findPreset()">
            <option value="standard">Standard ([xx_60] / [xx_100])</option>
            <option value="c">Cardioid (C)</option>
            <option value="cx">Cardioid (Cx)</option>
        </select>
    </div>

    <div id="resultBox" class="result-box">
        <h3>Pre-alignment Delay:</h3>
        <p><strong>Top Delay:</strong> <span id="delayTopValue">-</span></p>
        <p><strong>Sub Delay:</strong> <span id="delaySubValue">-</span></p>
        <p><strong>Polarita (Top/Sub):</strong> <span id="polarityValue">-</span></p>
    </div>

    <div class="footer">
        Zdroj dat: L-Acoustics Preset Guide version 28.0 (Jan 2026)
    </div>
</div>

<script>
    /* Databáze presetů z manuálu v28.0. 
       Poznámka: U Kara II bereme standardní presety s filtrem [xx_60].
    */
    const presetDatabase = {
        // --- Kara II + SB18 ---
        "kara2-sb18-standard": { topDelay: "2.5 ms", subDelay: "0 ms", polarity: "+ / +" },
        "kara2-sb18-c": { topDelay: "8 ms", subDelay: "0 ms", polarity: "+ / +" },
        "kara2-sb18-cx": { topDelay: "6.5 ms", subDelay: "0 ms", polarity: "+ / +" },
        
        // --- Kara II + KS21 ---
        "kara2-ks21-standard": { topDelay: "0.5 ms", subDelay: "0 ms", polarity: "+ / +" },
        "kara2-ks21-c": { topDelay: "6 ms", subDelay: "0 ms", polarity: "+ / +" },
        "kara2-ks21-cx": { topDelay: "5.5 ms", subDelay: "0 ms", polarity: "+ / +" },

        // --- Kara II + KS28 ---
        "kara2-ks28-standard": { topDelay: "0 ms", subDelay: "5 ms", polarity: "+ / +" },
        "kara2-ks28-c": { topDelay: "0.5 ms", subDelay: "0 ms", polarity: "+ / +" },
        "kara2-ks28-cx": { topDelay: "4.5 ms", subDelay: "0 ms", polarity: "+ / +" },

        // --- A15 + KS21 ---
        "a15-ks21-standard": { topDelay: "0 ms", subDelay: "2.3 ms", polarity: "+ / +" },
        "a15-ks21-c": { topDelay: "9 ms", subDelay: "0 ms", polarity: "+ / +" },
        "a15-ks21-cx": { topDelay: "8 ms", subDelay: "0 ms", polarity: "+ / +" },

        // --- A10 + KS21 ---
        "a10-ks21-standard": { topDelay: "0 ms", subDelay: "0 ms", polarity: "+ / +" },
        "a10-ks21-c": { topDelay: "5.5 ms", subDelay: "0 ms", polarity: "+ / +" },
        "a10-ks21-cx": { topDelay: "0 ms", subDelay: "0 ms", polarity: "+ / +" }
        
        // Ostatní kombinace (např. A15+SB18, A10+KS28) nejsou v manuálu předpočítány.
    };

    function findPreset() {
        const top = document.getElementById('topSpeaker').value;
        const sub = document.getElementById('subSpeaker').value;
        const mode = document.getElementById('subMode').value;
        const resultBox = document.getElementById('resultBox');
        
        if (top && sub) {
            const searchKey = top + "-" + sub + "-" + mode;
            const preset = presetDatabase[searchKey];

            if (preset) {
                document.getElementById('delayTopValue').innerText = preset.topDelay;
                document.getElementById('delaySubValue').innerText = preset.subDelay;
                document.getElementById('polarityValue').innerText = preset.polarity;
            } else {
                document.getElementById('delayTopValue').innerText = "Nedefinováno v manuálu";
                document.getElementById('delaySubValue').innerText = "Nedefinováno v manuálu";
                document.getElementById('polarityValue').innerText = "-";
            }
            resultBox.style.display = 'block';
        } else {
            resultBox.style.display = 'none';
        }
    }
</script>

</body>
</html>
