<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L-Acoustics Setup</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            color: #333;
            display: flex;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background-color: #fff;
            padding: 20px 30px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            max-width: 500px;
            width: 100%;
        }
        h1 {
            font-size: 1.5em;
            text-align: center;
            color: #2c3e50;
            margin-top: 0;
            margin-bottom: 25px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
            color: #2c3e50;
        }
        
        /* Flexibilní řádek pro select a výsledek */
        .input-row {
            display: flex;
            align-items: center;
            gap: 15px;
            flex-wrap: wrap; /* Zalomí se na malých displejích */
        }
        
        select {
            flex: 1; /* Zabere zbývající volné místo */
            min-width: 160px;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 1em;
            background-color: #fff;
        }
        
        /* Inline box s výsledky vedle selectu */
        .inline-result {
            display: none;
            background-color: #e8f4f8;
            padding: 9px 15px;
            border-radius: 4px;
            border-left: 4px solid #3498db;
            font-size: 0.95em;
            white-space: nowrap; /* Zabrání rozlomení textu uvnitř bubliny */
        }
        
        /* Zvýraznění záporné polarity */
        .pol-minus {
            color: #e74c3c;
            font-weight: bold;
            font-size: 1.1em;
        }
        .pol-plus {
            font-weight: bold;
            font-size: 1.1em;
            color: #2c3e50;
        }

        .error-message {
            text-align: center;
            color: #e74c3c;
            font-weight: bold;
            padding: 15px;
            display: none;
            background-color: #fceceb;
            border-radius: 4px;
            margin-top: 15px;
        }
        .footer {
            margin-top: 25px;
            font-size: 0.8em;
            text-align: center;
            color: #7f8c8d;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>L-Acoustics Setup</h1>
    
    <div class="form-group">
        <label for="topSpeaker">Top reprobedna:</label>
        <div class="input-row">
            <select id="topSpeaker" onchange="findPreset()">
                <option value="">-- Vyber Top --</option>
                <option value="kara2">Kara II</option>
                <option value="a15">A15</option>
                <option value="a10">A10</option>
            </select>
            <div id="topResult" class="inline-result">
                Delay: <strong id="topDelay">-</strong> &nbsp;|&nbsp; Pol: <span id="topPol">-</span>
            </div>
        </div>
    </div>

    <div class="form-group">
        <label for="subSpeaker">Subwoofer:</label>
        <div class="input-row">
            <select id="subSpeaker" onchange="findPreset()">
                <option value="">-- Vyber Sub --</option>
                <option value="sb18">SB18</option>
                <option value="ks21">KS21</option>
                <option value="ks28">KS28</option>
            </select>
            <div id="subResult" class="inline-result">
                Delay: <strong id="subDelay">-</strong> &nbsp;|&nbsp; Pol: <span id="subPol">-</span>
            </div>
        </div>
    </div>

    <div class="form-group">
        <label for="subMode">Režim Subwooferu:</label>
        <select id="subMode" onchange="findPreset()" style="width: 100%;">
            <option value="standard">Standard</option>
            <option value="c">Cardioid (C)</option>
            <option value="cx">Cardioid (Cx)</option>
        </select>
    </div>

    <div id="errorMessage" class="error-message">
        Tato kombinace není v manuálu definována.
    </div>

    <div class="footer">
        Zdroj dat: Preset Guide v28.0
    </div>
</div>

<script src="data.js?v=3"></script>

<script>
    function findPreset() {
        const topSelect = document.getElementById('topSpeaker');
        const subSelect = document.getElementById('subSpeaker');
        const mode = document.getElementById('subMode').value;
        
        const top = topSelect.value;
        const sub = subSelect.value;
        
        const errorMessage = document.getElementById('errorMessage');
        const topResult = document.getElementById('topResult');
        const subResult = document.getElementById('subResult');

        if (top && sub) {
            const searchKey = top + "-" + sub + "-" + mode;
            const preset = presetDatabase[searchKey];

            if (preset) {
                // Vyplnění Delay
                document.getElementById('topDelay').innerText = preset.topDelay;
                document.getElementById('subDelay').innerText = preset.subDelay;

                // Zpracování polarity (Top)
                const topPolEl = document.getElementById('topPol');
                topPolEl.innerText = preset.topPol;
                if (preset.topPol === "-") {
                    topPolEl.className = "pol-minus";
                } else {
                    topPolEl.className = "pol-plus";
                }

                // Zpracování polarity (Sub)
                const subPolEl = document.getElementById('subPol');
                subPolEl.innerText = preset.subPol;
                if (preset.subPol === "-") {
                    subPolEl.className = "pol-minus";
                } else {
                    subPolEl.className = "pol-plus";
                }

                errorMessage.style.display = 'none';
                topResult.style.display = 'block';
                subResult.style.display = 'block';
            } else {
                topResult.style.display = 'none';
                subResult.style.display = 'none';
                errorMessage.style.display = 'block';
            }
        } else {
            topResult.style.display = 'none';
            subResult.style.display = 'none';
            errorMessage.style.display = 'none';
        }
    }
</script>

</body>
</html>
