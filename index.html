<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>L-Acoustics Setup</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f6f8;
            color: #2c3e50;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.05);
            max-width: 550px;
            width: 100%;
        }

        h1 {
            font-size: 1.7em;
            text-align: center;
            color: #1a252f;
            margin-top: 0;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #34495e;
            font-size: 0.95em;
        }
        
        .input-row {
            display: flex;
            gap: 15px;
            align-items: stretch; 
        }
        
        select {
            flex: 1; 
            min-width: 180px;
            height: 44px;
            padding: 0 12px;
            border: 1px solid #cbd5e1;
            border-radius: 6px;
            font-size: 1em;
            background-color: #f8fafc;
            color: #2c3e50;
            cursor: pointer;
            outline: none;
            transition: border-color 0.2s, background-color 0.2s;
        }
        
        select:focus {
            border-color: #3498db;
            background-color: #ffffff;
        }
        
        .inline-result {
            display: none;
            align-items: center; 
            height: 44px; 
            background-color: #e8f4f8;
            padding: 0 16px;
            border-radius: 6px;
            border-left: 5px solid #3498db;
            font-size: 0.95em;
            white-space: nowrap; 
            flex: 0 0 185px; /* PEVNÁ ŠÍŘKA: donutí selecty být stejně široké */
        }
        
        .pol-minus {
            color: #e74c3c;
            font-weight: bold;
            font-size: 1.1em;
        }
        
        .pol-plus {
            font-weight: bold;
            font-size: 1.1em;
            color: #2c3e50;
        }

        .error-message {
            text-align: center;
            color: #e74c3c;
            background-color: #fdf2f2;
            border: 1px solid #fadbd8;
            font-weight: bold;
            padding: 12px;
            border-radius: 6px;
            display: none;
            margin-top: 10px;
        }

        .footer {
            margin-top: 30px;
            font-size: 0.8em;
            text-align: center;
            color: #95a5a6;
        }

        @media (max-width: 480px) {
            .input-row {
                flex-direction: column;
                gap: 10px;
            }
            select, .inline-result {
                width: 100%;
                flex: auto; /* Reset šířky pro mobilní telefony */
            }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>L-Acoustics Setup</h1>
    
    <div class="form-group">
        <label for="topSpeaker">Top reprobedna:</label>
        <div class="input-row">
            <select id="topSpeaker" onchange="findPreset()">
                <option value="">-- Vyber Top --</option>
                <option value="kara2">Kara II</option>
                <option value="a15">A15</option>
                <option value="a10">A10</option>
            </select>
            <div id="topResult" class="inline-result">
                Delay: &nbsp;<strong id="topDelay">-</strong>&nbsp;&nbsp;|&nbsp;&nbsp;Pol: &nbsp;<span id="topPol">-</span>
            </div>
        </div>
    </div>

    <div class="form-group">
        <label for="subSpeaker">Subwoofer:</label>
        <div class="input-row">
            <select id="subSpeaker" onchange="findPreset()">
                <option value="">-- Vyber Sub --</option>
                <option value="sb18">SB18</option>
                <option value="ks21">KS21</option>
                <option value="ks28">KS28</option>
            </select>
            <div id="subResult" class="inline-result">
                Delay: &nbsp;<strong id="subDelay">-</strong>&nbsp;&nbsp;|&nbsp;&nbsp;Pol: &nbsp;<span id="subPol">-</span>
            </div>
        </div>
    </div>

    <div class="form-group">
        <label for="subMode">Režim Subwooferu:</label>
        <select id="subMode" onchange="findPreset()" style="width: 100%;">
            <option value="standard">Standard</option>
            <option value="c">Cardioid (C)</option>
            <option value="cx">Cardioid (Cx)</option>
        </select>
    </div>

    <div id="errorMessage" class="error-message">
        Tato kombinace není v manuálu definována.
    </div>

    <div class="footer">
        Zdroj dat: Preset Guide v28.0
    </div>
</div>

<script src="data.js?v=4"></script>

<script>
    function findPreset() {
        const topSelect = document.getElementById('topSpeaker');
        const subSelect = document.getElementById('subSpeaker');
        const mode = document.getElementById('subMode').value;
        
        const top = topSelect.value;
        const sub = subSelect.value;
        
        const errorMessage = document.getElementById('errorMessage');
        const topResult = document.getElementById('topResult');
        const subResult = document.getElementById('subResult');

        if (top && sub) {
            const searchKey = top + "-" + sub + "-" + mode;
            const preset = presetDatabase[searchKey];

            if (preset) {
                document.getElementById('topDelay').innerText = preset.topDelay;
                document.getElementById('subDelay').innerText = preset.subDelay;

                const topPolEl = document.getElementById('topPol');
                topPolEl.innerText = preset.topPol;
                if (preset.topPol === "-") {
                    topPolEl.className = "pol-minus";
                } else {
                    topPolEl.className = "pol-plus";
                }

                const subPolEl = document.getElementById('subPol');
                subPolEl.innerText = preset.subPol;
                if (preset.subPol === "-") {
                    subPolEl.className = "pol-minus";
                } else {
                    subPolEl.className = "pol-plus";
                }

                errorMessage.style.display = 'none';
                topResult.style.display = 'flex';
                subResult.style.display = 'flex';
            } else {
                topResult.style.display = 'none';
                subResult.style.display = 'none';
                errorMessage.style.display = 'block';
            }
        } else {
            topResult.style.display = 'none';
            subResult.style.display = 'none';
            errorMessage.style.display = 'none';
        }
    }
</script>

</body>
</html>
